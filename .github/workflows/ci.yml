name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 22.19.0
          - os: ubuntu-latest
            node: 24.x
          - os: macos-latest
            node: 22.19.0
          - os: windows-latest
            node: 22.19.0

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run docs:check
      - run: npm run build:cli
      - run: npm run build:web

  package:
    name: Package smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run package:check
      - run: npm audit --omit=dev

  cloud-containers:
    name: Cloud container build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate Compose configuration
        env:
          KROSS_ACCESS_TOKEN: ci-placeholder-token
        run: docker compose config --quiet

      - name: Build worker image
        run: docker build --file docker/worker.Dockerfile --tag kross-worker:ci .

      - name: Build gateway image
        run: docker build --file docker/server.Dockerfile --tag kross-server:ci .

      - name: Build web image
        run: docker build --file docker/web.Dockerfile --tag kross-web:ci .
