name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 22.19.0
          - os: ubuntu-latest
            node: 24.x
          - os: macos-latest
            node: 22.19.0
          - os: windows-latest
            node: 22.19.0

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run build:bundle

  package:
    name: Package smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run package:check
      - run: npm audit --omit=dev
